appId: com.neurotech.arcade.agent
productName: Arcade Agent
copyright: Neurotech Biratnagar
directories:
  output: dist
files:
  - "dist/main/**/*"
  - "dist/renderer/**/*"
  - "package.json"
win:
  target:
    - nsis
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  identity: null
  gatekeeperAssess: false
  hardenedRuntime: false
linux:
  target:
    - AppImage
    - deb
  category: Utility
nsis:
  oneClick: false
