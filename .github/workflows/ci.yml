name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev
      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff==0.8.0 black==24.10.0
      - name: Run ruff
        run: ruff check backend/ --target-version py312
      - name: Run black check
        run: black --check backend/

  type-check-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev
      - name: Install dependencies
        run: pip install -r backend/requirements.txt mypy==1.13.0
      - name: Run mypy
        run: mypy --strict backend/

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev
      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pytest-cov
      - name: Run tests with coverage
        run: pytest backend/ --cov=backend --cov-report=xml --cov-fail-under=80
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run lint
        run: cd frontend && npm run lint

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests
        run: cd frontend && npm run test -- --run

  lint-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "agent/package-lock.json"
      - name: Install dependencies
        run: cd agent && npm ci
      - name: Run lint
        run: cd agent && npm run lint
